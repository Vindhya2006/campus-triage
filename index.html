<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <meta charset="UTF-8" />

    <!-- ── PWA & Mobile core meta ─────────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CampusTriage" />
    <meta name="application-name" content="CampusTriage" />
    <meta name="theme-color" content="#1a8fe3" />

    <!-- ── SEO / Description ──────────────────────────────────────────────── -->
    <meta name="description" content="Healthcare support platform for hostel students — doctor consultations, prescriptions, medicine delivery, and emergency support." />
    <meta name="keywords" content="healthcare, students, doctor, consultation, hostel, medicine, emergency" />
    <meta name="author" content="CampusTriage" />

    <!-- ── Open Graph (for sharing) ──────────────────────────────────────── -->
    <meta property="og:title" content="CampusTriage" />
    <meta property="og:description" content="Healthcare support for hostel students" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- ── Favicon & Apple Touch Icons ───────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />

    <!-- Apple touch icons (required for "Add to Home Screen" on iOS) -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128x128.png" />
    <link rel="apple-touch-icon" sizes="96x96"   href="/icons/icon-96x96.png" />
    <link rel="apple-touch-icon" sizes="72x72"   href="/icons/icon-72x72.png" />

    <!-- ── Splash screen colour on iOS ───────────────────────────────────── -->
    <meta name="msapplication-TileColor" content="#1a8fe3" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <title>CampusTriage</title>
    <script src="https://meet.jit.si/external_api.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
